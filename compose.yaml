# ─── ASTrace AI – Docker Compose ─────────────────────────────────────────────
# Volumes and run commands are injected dynamically by astrace.sh

services:
  audit:
    build:
      context: .
      dockerfile: Dockerfile
      # Enable BuildKit cache mounts
      args:
        BUILDKIT_INLINE_CACHE: "1"
    # Secrets injected at runtime
    env_file:
      - path: .env
        required: true
    # Force TTY for Rich colour rendering
    stdin_open: true
    tty: true
    # Harden container (read-only rootfs)
    read_only: true
    tmpfs:
      - /tmp
